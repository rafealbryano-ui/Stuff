<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — mailserver.life</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0e0e0e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      padding: 40px 20px;
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand h1 {
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .brand p {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 6px;
    }

    .card {
      width: 100%;
      max-width: 340px;
      background: #1a1a1a;
      border: 0.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 28px 24px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 6px;
    }

    .card-sub {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.35);
      line-height: 1.6;
      margin-bottom: 22px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 6px;
    }

    .input-wrap {
      display: flex;
      align-items: center;
      background: #111;
      border: 0.5px solid rgba(255, 255, 255, 0.1);
      border-radius: 7px;
      overflow: hidden;
    }

    .input-wrap:focus-within {
      border-color: rgba(255, 255, 255, 0.3);
    }

    .input-wrap input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 10px 12px;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
    }

    .input-wrap input::placeholder {
      color: rgba(255, 255, 255, 0.15);
    }

    .btn-reset {
      width: 100%;
      padding: 11px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 4px;
    }

    .btn-reset:hover {
      background: #e0e0e0;
    }
