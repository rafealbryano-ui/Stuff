<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — mailserver.life</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0e0e0e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      padding: 40px 20px;
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand h1 {
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .brand p {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 6px;
    }

    .card {
      width: 100%;
      max-width: 340px;
      background: #1a1a1a;
      border: 0.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 28px 24px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 6px;
    }

    .card-sub {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.35);
      line-height: 1.6;
      margin-bottom: 22px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 6px;
    }

    .input-wrap {
      display: flex;
      align-items: center;
      background: #111;
      border: 0.5px solid rgba(255, 255, 255, 0.1);
      border-radius: 7px;
      overflow: hidden;
    }

    .input-wrap:focus-within {
      border-color: rgba(255, 255, 255, 0.3);
    }

    .input-wrap input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 10px 12px;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
    }

    .input-wrap input::placeholder {
      color: rgba(255, 255, 255, 0.15);
    }

    .btn-reset {
      width: 100%;
      padding: 11px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 4px;
    }

    .btn-reset:hover {
      background: #e0e0e0;
    }

    .btn-reset:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .success {
      display: none;
      text-align: center;
      padding: 8px 0;
    }

    .success-icon {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .success p {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.45);
      line-height: 1.6;
    }

    .success p span {
      color: #fff;
      font-weight: 500;
    }

    .error-msg {
      color: #ff6b6b;
      font-size: 12px;
      margin-top: 8px;
      display: none;
      text-align: center;
    }

    .footer {
      text-align: center;
      margin-top: 18px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.35);
    }

    .footer a {
      color: rgba(255, 255, 255, 0.5);
      font-weight: 600;
      text-decoration: none;
    }

    .footer a:hover {
      color: #fff;
    }
  </style>
</head>
<body>

  <div class="brand">
    <h1>mailserver.life</h1>
    <p>Private. Simple. Yours.</p>
  </div>

  <div class="card">
    <div id="form-view">
      <p class="card-title">Reset your password</p>
      <p class="card-sub">Enter your email and we'll send a password reset link.</p>

      <div class="field">
        <label for="email">Email</label>
        <div class="input-wrap">
          <input type="email" id="email" name="email" autocomplete="email" placeholder="Enter your email" />
        </div>
      </div>

      <div class="error-msg" id="resetError">Email not found. Please try again.</div>
      <button class="btn-reset" type="button" id="resetBtn" onclick="handleReset()">Send reset link</button>
    </div>

    <div class="success" id="success-view">
      <div class="success-icon">✉️</div>
      <p>If <span id="entered-user"></span> has an account, a password reset link is on its way.</p>
    </div>
  </div>

  <div class="footer">
    <a href="/login">← Back to sign in</a>
  </div>

  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyC1xj2lQYZoiu7h-orFfGlOy2i54Y2BMdA",
      authDomain: "mailserver-life.firebaseapp.com",
      projectId: "mailserver-life",
      storageBucket: "mailserver-life.firebasestorage.app",
      messagingSenderId: "195734676668",
      appId: "1:195734676668:web:40a868601cbaf8d473dcb9",
      measurementId: "G-V216FC1QMD"
    };
    firebase.initializeApp(firebaseConfig);
    var auth = firebase.auth();

    function handleReset() {
      var email = document.getElementById('email').value.trim();
      var error = document.getElementById('resetError');
      var btn = document.getElementById('resetBtn');
      
      if (!email) {
        error.textContent = 'Please enter your email.';
        error.style.display = 'block';
        return;
      }

      error.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Sending...';

      auth.sendPasswordResetEmail(email)
        .then(function() {
          document.getElementById('entered-user').textContent = email;
          document.getElementById('form-view').style.display = 'none';
          document.getElementById('success-view').style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Send reset link';
        })
        .catch(function(error) {
          btn.disabled = false;
          btn.textContent = 'Send reset link';
          if (error.code === 'auth/user-not-found') {
            error.textContent = 'No account found with this email.';
          } else {
            error.textContent = 'Error sending reset email. Please try again.';
          }
          error.style.display = 'block';
        });
    }

    document.getElementById('email').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        handleReset();
      }
    });
  </script>

</body>
</html>
