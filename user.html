<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mailserver.life — Profile</title>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}html,body{background:#0a0a0a;color:#e8e8e8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;height:100%;min-height:100vh;display:flex;align-items:center;justify-content:center}.profile-container{display:flex;align-items:center;justify-content:center;padding:40px 20px;width:100%;min-height:100vh;position:relative;z-index:2}.profile-card{background:rgba(19,19,19,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.06);border-radius:16px;overflow:hidden;max-width:500px;width:100%;position:relative;z-index:1;box-shadow:0 8px 40px rgba(0,0,0,0.6);transition:box-shadow 0.3s ease}.profile-number{position:absolute;top:14px;left:18px;font-size:12px;font-weight:600;color:#e8e8e8;letter-spacing:.02em;z-index:2;background:rgba(0,0,0,0.5);padding:2px 10px;border-radius:12px;border:1px solid rgba(255,255,255,0.06);transition:border-color 0.3s,color 0.3s,box-shadow 0.3s}.profile-top{padding:30px 20px 16px;display:flex;flex-direction:column;align-items:center;padding-top:44px}.profile-avatar-ring{width:96px;height:96px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:12px;box-shadow:0 0 0 1px rgba(255,255,255,0.06);transition:border-color 0.3s,box-shadow 0.3s;border:2px solid #000000}.profile-avatar-inner{width:78px;height:78px;border-radius:50%;background:#181818;display:flex;align-items:center;justify-content:center;overflow:hidden}.profile-handle{font-size:17px;color:#e8e8e8;font-weight:500;letter-spacing:.01em;margin-bottom:2px;transition:text-shadow 0.3s}.profile-bio{font-size:12px;color:#666;margin:4px 0 14px;text-align:center;max-width:280px;line-height:1.5}.profile-tags{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:4px;transition:filter 0.3s}.profile-tag{font-size:11px;color:#e0e0e0;background:#222;border:1px solid #3a3a3a;border-radius:20px;padding:3px 10px;cursor:pointer;transition:background .15s}.profile-tag:hover{background:#2a2a2a}.profile-tag a{color:#e0e0e0;text-decoration:none}.profile-tag a:hover{color:#fff}.profile-footer{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-top:1px solid rgba(255,255,255,0.04)}.profile-footer .views{color:#888;font-weight:500;font-size:10px;letter-spacing:.08em;text-transform:uppercase}.profile-footer .domain{color:#555;font-size:10px;letter-spacing:.08em;text-transform:uppercase}.profile-bg-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;background-size:cover;background-position:center;background-repeat:no-repeat;background-attachment:fixed;display:none;background-color:#0a0a0a}.profile-bg-overlay.show{display:block}.loading-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0a;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;transition:opacity 0.5s}.loading-overlay.hidden{opacity:0;pointer-events:none}.loading-spinner{width:40px;height:40px;border:3px solid #1a1a1a;border-top-color:#5b8ef0;border-radius:50%;animation:spin 0.8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.loading-text{color:#666;font-size:14px;letter-spacing:1px}.toast{position:fixed;bottom:20px;right:20px;background:#1f1f2e;border:1px solid #5b8ef0;border-radius:8px;padding:12px 18px;font-size:13px;color:#e8e8e8;z-index:999;opacity:0;transform:translateY(10px);transition:opacity .3s,transform .3s;pointer-events:none}.toast.show{opacity:1;transform:translateY(0)}
</style>
</head>
<body>
<div class="profile-bg-overlay" id="profileBgOverlay"></div>
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Loading profile...</div>
</div>
<div id="root"></div>
<script>
var firebaseConfig = {
  apiKey: "AIzaSyC1xj2lQYZoiu7h-orFfGlOy2i54Y2BMdA",
  authDomain: "mailserver-life.firebaseapp.com",
  projectId: "mailserver-life",
  storageBucket: "mailserver-life.firebasestorage.app",
  messagingSenderId: "195734676668",
  appId: "1:195734676668:web:40a868601cbaf8d473dcb9",
  measurementId: "G-V216FC1QMD"
};
firebase.initializeApp(firebaseConfig);
var auth = firebase.auth();
var db = firebase.firestore();
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

var D = 'mailserver.life';
var loggedInUser = null;

function getSession() {
  try {
    var raw = sessionStorage.getItem('mailserver_session');
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) {
    return null;
  }
}

function showToast(msg) {
  var el = document.getElementById('toast-el');
  if (!el) {
    var toast = document.createElement('div');
    toast.className = 'toast';
    toast.id = 'toast-el';
    document.body.appendChild(toast);
    el = toast;
  }
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 3000);
}

function loadProfile(username) {
  var container = document.getElementById('profileContainer');
  if (!container) {
    var c = document.createElement('div');
    c.className = 'profile-container';
    c.id = 'profileContainer';
    document.getElementById('root').appendChild(c);
    container = c;
  }
  
  container.innerHTML = '<div style="padding:40px 20px;text-align:center;color:#888;display:flex;flex-direction:column;align-items:center;gap:12px"><span class="loading-spinner" style="width:24px;height:24px;border-width:3px;display:inline-block;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite"></span><span>Loading profile...</span></div>';
  
  db.collection('handles').doc(username).get()
    .then(function(doc) {
      if (!doc.exists) {
        container.innerHTML = '<div style="padding:40px 20px;text-align:center;color:#888">User @' + username + ' not found.</div>';
        return;
      }
      var handleData = doc.data();
      var ownerUid = handleData.ownerUid;
      return db.collection('users').doc(ownerUid).get().then(function(userDoc) {
        if (!userDoc.exists) {
          var currentViews = handleData.views || 0;
          var newViews = currentViews + 1;
          return db.collection('handles').doc(username).update({ views: newViews })
            .then(function() {
              handleData.views = newViews;
              renderProfile(container, handleData, [], null, null, handleData.userNumber || 0);
            });
        }
        var userData = userDoc.data();
        var currentViews = handleData.views || 0;
        var newViews = currentViews + 1;
        return db.collection('handles').doc(username).update({ views: newViews })
          .then(function() {
            handleData.views = newViews;
            return db.collection('handles').where('ownerUid', '==', ownerUid).get()
              .then(function(snapshot) {
                var allHandles = [];
                snapshot.forEach(function(d) {
                  allHandles.push(d.data());
                });
                allHandles.sort(function(a, b) {
                  return (a.userNumber || 0) - (b.userNumber || 0);
                });
                var backgroundUrl = userData.backgroundUrl || '';
                var accentColor = userData.accentColor || '#000000';
                var settings = userData.settings || {};
                var userNumber = userData.userNumber || handleData.userNumber || 0;
                renderProfile(container, handleData, allHandles, backgroundUrl, accentColor, settings, userNumber);
              });
          });
      });
    })
    .catch(function(err) {
      container.innerHTML = '<div style="padding:40px 20px;text-align:center;color:#888">Error loading profile.</div>';
      console.error(err);
    });
}

function renderProfile(container, handleData, allHandles, backgroundUrl, accentColor, settings, userNumber) {
  var avatarUrl = handleData.avatarUrl || '';
  var displayName = handleData.displayName || handleData.username;
  var bio = handleData.bio || 'No bio yet.';
  var ownerUid = handleData.ownerUid;
  var username = handleData.username;
  var views = handleData.views || 0;
  var accent = accentColor || '#000000';
  var number = userNumber || handleData.userNumber || 0;
  
  var glowEnabled = settings && settings.glowEnabled || false;
  var glowGlow = settings && settings.glowGlow || false;
  var glowText = settings && settings.glowText || false;
  var glowIcons = settings && settings.glowIcons || false;

  var bgOverlay = document.getElementById('profileBgOverlay');
  if (bgOverlay) {
    if (backgroundUrl) {
      bgOverlay.style.backgroundImage = 'url("' + backgroundUrl + '")';
      bgOverlay.style.backgroundColor = 'transparent';
      bgOverlay.classList.add('show');
    } else {
      bgOverlay.classList.remove('show');
      bgOverlay.style.backgroundImage = '';
      bgOverlay.style.backgroundColor = '#0a0a0a';
    }
  }

  var aliases = allHandles && allHandles.length ? allHandles.filter(function(h) {
    return h.ownerUid === ownerUid && h.username !== username;
  }) : [];

  var avatarHtml = '';
  if (avatarUrl) {
    avatarHtml = '<img src="' + avatarUrl + '" alt="' + displayName + '" style="width:78px;height:78px;border-radius:50%;object-fit:cover;border:2px solid ' + accent + '">';
  } else {
    var initial = displayName ? displayName[0].toUpperCase() : username[0].toUpperCase();
    avatarHtml = '<span style="font-size:28px;font-weight:700;color:#e8e8e8">' + initial + '</span>';
  }

  var tagsHtml = '';
  if (aliases.length > 0) {
    aliases.forEach(function(a) {
      tagsHtml += '<span class="profile-tag"><a href="/user.html?username=' + a.username + '">@' + a.username + '</a></span>';
    });
  }

  var cardStyle = '';
  var ringStyle = 'border-color:' + accent + ';';
  var numberStyle = 'border-color:' + accent + ';color:#e8e8e8;';
  var handleStyle = '';
  var tagsStyle = '';

  if (glowEnabled) {
    if (glowGlow) {
      cardStyle += 'box-shadow: 0 0 40px ' + accent + '40, 0 0 80px ' + accent + '20;';
      ringStyle += 'box-shadow: 0 0 30px ' + accent + '60, 0 0 60px ' + accent + '30;';
      numberStyle += 'box-shadow: 0 0 15px ' + accent + '40;';
    }
    if (glowText) {
      handleStyle += 'text-shadow: 0 0 20px ' + accent + '80, 0 0 40px ' + accent + '40;';
    }
    if (glowIcons) {
      tagsStyle += 'filter: drop-shadow(0 0 10px ' + accent + ');';
    }
  }

  var html = '';
  html += '<div class="profile-card" style="' + cardStyle + '">';
  html += '  <div class="profile-number" style="' + numberStyle + '">#' + number + '</div>';
  html += '  <div class="profile-top">';
  html += '    <div class="profile-avatar-ring" style="' + ringStyle + '">';
  html += '      <div class="profile-avatar-inner">' + avatarHtml + '</div>';
  html += '    </div>';
  html += '    <div class="profile-handle" style="' + handleStyle + '">@' + username + '</div>';
  html += '    <div class="profile-bio">' + bio + '</div>';
  html += '    <div class="profile-tags" style="' + tagsStyle + '">' + tagsHtml + '</div>';
  html += '  </div>';
  html += '  <div class="profile-footer">';
  html += '    <span class="views">' + views + ' VIEWS</span>';
  html += '    <span class="domain">' + D.toUpperCase() + '</span>';
  html += '  </div>';
  html += '</div>';

  container.innerHTML = html;
  document.title = '@' + username + ' — mailserver.life';
  
  var overlay = document.getElementById('loadingOverlay');
  if (overlay) overlay.classList.add('hidden');
}

function init() {
  var params = new URLSearchParams(window.location.search);
  var username = params.get('username');
  
  if (!username) {
    var path = window.location.pathname;
    if (path.startsWith('/user/')) {
      username = path.replace('/user/', '');
      if (username.endsWith('/')) username = username.slice(0, -1);
      if (username.endsWith('.html')) username = username.slice(0, -5);
    }
  }
  
  if (!username) {
    var container = document.getElementById('profileContainer');
    if (!container) {
      var c = document.createElement('div');
      c.className = 'profile-container';
      c.id = 'profileContainer';
      document.getElementById('root').appendChild(c);
      container = c;
    }
    container.innerHTML = '<div style="padding:40px 20px;text-align:center;color:#888">No username specified.</div>';
    var overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.add('hidden');
    return;
  }
  
  loadProfile(username);
}

init();
</script>
</body>
</html>
