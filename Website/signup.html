<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — mailserver.life</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-container {
      max-width: 400px;
      margin: 80px auto;
      padding: 40px;
      background: #111;
      border-radius: 12px;
      border: 1px solid #1a1a1a;
    }
    .auth-container h1 {
      font-size: 28px;
      color: #fff;
      margin-bottom: 8px;
    }
    .auth-container p {
      color: #555;
      margin-bottom: 24px;
    }
    .auth-container input {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 12px;
      background: #0a0a0a;
      border: 1px solid #252525;
      border-radius: 6px;
      color: #e8e8e8;
      font-size: 14px;
      box-sizing: border-box;
    }
    .auth-container input:focus {
      outline: none;
      border-color: #5c7cfa;
    }
    .auth-container button {
      width: 100%;
      padding: 12px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .auth-container button:hover {
      background: #d8d8d8;
    }
    .auth-container .link {
      color: #5c7cfa;
      text-decoration: none;
    }
    .auth-container .link:hover {
      text-decoration: underline;
    }
    .back-link {
      display: inline-block;
      margin-top: 16px;
      color: #555;
      text-decoration: none;
      font-size: 13px;
    }
    .back-link:hover {
      color: #e8e8e8;
    }
  </style>
</head>
<body>
  <nav style="padding:14px 32px;border-bottom:1px solid #1a1a1a;background:#0a0a0a;">
    <div style="display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto;">
      <a href="index.html" style="font-size:15px;font-weight:600;color:#fff;text-decoration:none;letter-spacing:-0.3px;">mailserver.life</a>
    </div>
  </nav>

  <div class="auth-container">
    <h1>Create your account</h1>
    <p>Start your private email journey.</p>
    <form>
      <input type="text" placeholder="Choose a username" required>
      <input type="email" placeholder="Email address" required>
      <input type="password" placeholder="Password" required>
      <button type="submit">Sign Up</button>
    </form>
    <p style="margin-top:16px;font-size:14px;">Already have an account? <a href="login.html" class="link">Log in</a></p>
    <a href="index.html" class="back-link">← Back to home</a>
  </div>
</body>
</html>
