<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — mailserver.life</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0e0e0e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      padding: 40px 20px;
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand h1 {
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .brand p {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 6px;
    }

    .card {
      width: 100%;
      max-width: 340px;
      background: #1a1a1a;
      border: 0.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 28px 24px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 6px;
    }

    .input-wrap {
      display: flex;
      align-items: center;
      background: #111;
      border: 0.5px solid rgba(255, 255, 255, 0.1);
      border-radius: 7px;
      overflow: hidden;
    }

    .input-wrap:focus-within {
      border-color: rgba(255, 255, 255, 0.3);
    }

    .input-wrap input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 10px 12px;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
    }

    .input-wrap input::placeholder {
      color: rgba(255, 255, 255, 0.15);
    }

    .show-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.35);
      font-size: 12px;
      font-family: inherit;
      padding: 0 12px;
      height: 40px;
    }

    .show-btn:hover {
      color: rgba(255, 255, 255, 0.65);
    }

    .btn-signin {
      width: 100%;
      padding: 11px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 4px;
    }

    .btn-signin:hover {
      background: #e0e0e0;
    }

    .btn-signin:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .footer {
      text-align: center;
      margin-top: 18px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.35);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .footer a {
      color: #5b8ef0;
      text-decoration: none;
      font-weight: 500;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    .forgot a {
      color: rgba(255, 255, 255, 0.5);
      font-weight: 600;
      text-decoration: none;
    }

    .forgot a:hover {
      color: #fff;
    }

    .error-msg {
      color: #ff6b6b;
      font-size: 12px;
      margin-top: 8px;
      display: none;
      text-align: center;
    }

    .success-msg {
      color: #5b8ef0;
      font-size: 12px;
      margin-top: 8px;
      display: none;
      text-align: center;
    }

    .twofa-section {
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      margin-top: 16px;
      padding-top: 16px;
      display: none;
    }

    .twofa-section.active {
      display: block;
    }

    .twofa-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 6px;
    }

    .twofa-code {
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 4px;
      font-size: 20px;
      color: #fff;
      background: #0a0a0a;
      padding: 12px;
      border-radius: 6px;
      text-align: center;
      border: 0.5px solid rgba(255, 255, 255, 0.1);
      margin: 8px 0;
    }
  </style>
</head>
<body>

  <div class="brand">
    <h1>mailserver.life</h1>
    <p>Private. Simple. Yours.</p>
  </div>

  <div class="card">
    <form id="loginForm" method="POST" action="/dashboard">
      <div class="field">
        <label for="username">Username</label>
        <div class="input-wrap">
          <input type="text" id="username" name="username" autocomplete="username" placeholder="Enter your username" required />
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password" autocomplete="current-password" placeholder="Enter your password" required />
          <button class="show-btn" type="button" onclick="toggle('password', this)">Show</button>
        </div>
      </div>

      <div class="twofa-section" id="twofaSection">
        <div class="twofa-label">Enter your 2FA code from your authenticator app</div>
        <div class="input-wrap">
          <input type="text" id="twofaCode" placeholder="000000" maxlength="6" autocomplete="off" inputmode="numeric" pattern="[0-9]*" />
        </div>
        <div class="error-msg" id="twofaError">Invalid 2FA code. Please try again.</div>
      </div>

      <div class="error-msg" id="loginError">Invalid username or password.</div>
      <div class="success-msg" id="loginSuccess">Logging in...</div>
      <button type="submit" class="btn-signin" id="loginBtn">Sign in</button>
    </form>
  </div>

  <div class="footer">
    <div>No account? <a href="/signup">Register</a></div>
    <div class="forgot"><a href="/forgot">Forgot password?</a></div>
  </div>

  <script>
    function toggle(id, btn) {
      var input = document.getElementById(id);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = 'Hide';
      } else {
        input.type = 'password';
        btn.textContent = 'Show';
      }
    }

    function getUsers() {
      try {
        var raw = localStorage.getItem('mailserver_data');
        if (!raw) return {};
        var data = JSON.parse(raw);
        return data.users || {};
      } catch(e) { return {}; }
    }

    function generateTOTP(secret) {
      var time = Math.floor(Date.now() / 30000);
      var hmac = secret + time;
      var hash = 0;
      for (var i = 0; i < hmac.length; i++) {
        hash = ((hash << 5) - hash) + hmac.charCodeAt(i);
        hash = hash & hash;
      }
      var code = (Math.abs(hash) % 1000000).toString().padStart(6, '0');
      return code;
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();

      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value;
      var twofaCode = document.getElementById('twofaCode').value.trim();
      var error = document.getElementById('loginError');
      var success = document.getElementById('loginSuccess');
      var btn = document.getElementById('loginBtn');
      var twofaSection = document.getElementById('twofaSection');
      var twofaError = document.getElementById('twofaError');

      error.style.display = 'none';
      success.style.display = 'none';
      twofaError.style.display = 'none';

      if (!username || !password) {
        error.textContent = 'Please enter your username and password.';
        error.style.display = 'block';
        return;
      }

      var users = getUsers();

      if (!users[username]) {
        error.textContent = 'Invalid username or password.';
        error.style.display = 'block';
        return;
      }

      var user = users[username];

      if (user.password !== password) {
        error.textContent = 'Invalid username or password.';
        error.style.display = 'block';
        return;
      }

      if (user.twofa && user.twofa.enabled) {
        if (!twofaCode || twofaCode.length !== 6) {
          twofaSection.classList.add('active');
          twofaError.textContent = 'Please enter your 6-digit 2FA code.';
          twofaError.style.display = 'block';
          return;
        }

        var expected = generateTOTP(user.twofa.secret);
        if (twofaCode !== expected) {
          twofaSection.classList.add('active');
          twofaError.textContent = 'Invalid 2FA code. Please try again.';
          twofaError.style.display = 'block';
          return;
        }
      }

      success.style.display = 'block';
      success.textContent = 'Logging in...';
      btn.disabled = true;

      sessionStorage.setItem('mailserver_session', JSON.stringify({ username: username, loggedIn: true }));

      setTimeout(function() {
        window.location.href = '/dashboard';
      }, 800);
    });

    // Auto-fill username from claim if coming from homepage
    var claimed = sessionStorage.getItem('mailserver_claim');
    if (claimed) {
      document.getElementById('username').value = claimed;
      sessionStorage.removeItem('mailserver_claim');
    }
  </script>

</body>
</html>
