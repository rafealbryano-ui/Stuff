<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — mailserver.life</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0e0e0e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      padding: 40px 20px;
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand h1 {
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .brand p {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 6px;
    }

    .card {
      width: 100%;
      max-width: 340px;
      background: #1a1a1a;
      border: 0.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 28px 24px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 6px;
    }

    .input-wrap {
      display: flex;
      align-items: center;
      background: #111;
      border: 0.5px solid rgba(255, 255, 255, 0.1);
      border-radius: 7px;
      overflow: hidden;
    }

    .input-wrap:focus-within {
      border-color: rgba(255, 255, 255, 0.3);
    }

    .input-wrap input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 10px 12px;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
    }

    .input-wrap input::placeholder {
      color: rgba(255, 255, 255, 0.15);
    }

    .show-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.35);
      font-size: 12px;
      font-family: inherit;
      padding: 0 12px;
      height: 40px;
    }

    .show-btn:hover {
      color: rgba(255, 255, 255, 0.65);
    }

    .btn-signin {
      width: 100%;
      padding: 11px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.15s;
    }

    .btn-signin:hover {
      background: #e0e0e0;
    }

    .btn-signin:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .footer {
      text-align: center;
      margin-top: 18px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.35);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .footer a {
      color: #5b8ef0;
      text-decoration: none;
      font-weight: 500;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    .forgot a {
      color: rgba(255, 255, 255, 0.5);
      font-weight: 600;
      text-decoration: none;
    }

    .forgot a:hover {
      color: #fff;
    }

    .error-msg {
      color: #ff6b6b;
      font-size: 13px;
      margin-top: 12px;
      display: none;
      text-align: center;
    }

    .success-msg {
      color: #5b8ef0;
      font-size: 13px;
      margin-top: 12px;
      display: none;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="brand">
    <h1>mailserver.life</h1>
    <p>Private. Simple. Yours.</p>
  </div>

  <div class="card">
    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <div class="input-wrap">
          <input type="email" id="email" name="email" autocomplete="email" placeholder="Enter your email" required />
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password" autocomplete="current-password" placeholder="Enter your password" required />
          <button class="show-btn" type="button" onclick="toggle('password', this)">Show</button>
        </div>
      </div>

      <div class="error-msg" id="loginError">Invalid email or password.</div>
      <div class="success-msg" id="loginSuccess">Logging in...</div>
      <button type="submit" class="btn-signin" id="loginBtn">Sign in</button>
    </form>
  </div>

  <div class="footer">
    <div>No account? <a href="/signup">Register</a></div>
    <div class="forgot"><a href="/forgot">Forgot password?</a></div>
  </div>

  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyC1xj2lQYZoiu7h-orFfGlOy2i54Y2BMdA",
      authDomain: "mailserver-life.firebaseapp.com",
      projectId: "mailserver-life",
      storageBucket: "mailserver-life.firebasestorage.app",
      messagingSenderId: "195734676668",
      appId: "1:195734676668:web:40a868601cbaf8d473dcb9",
      measurementId: "G-V216FC1QMD"
    };
    firebase.initializeApp(firebaseConfig);
    var auth = firebase.auth();
    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

    function toggle(id, btn) {
      var input = document.getElementById(id);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = 'Hide';
      } else {
        input.type = 'password';
        btn.textContent = 'Show';
      }
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();

      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      var error = document.getElementById('loginError');
      var success = document.getElementById('loginSuccess');
      var btn = document.getElementById('loginBtn');

      error.style.display = 'none';
      success.style.display = 'none';

      if (!email || !password) {
        error.textContent = 'Please enter your email and password.';
        error.style.display = 'block';
        return;
      }

      success.style.display = 'block';
      success.textContent = 'Logging in...';
      btn.disabled = true;

      auth.signInWithEmailAndPassword(email, password)
        .then(function(userCredential) {
          var user = userCredential.user;
          var username = user.displayName || email.split('@')[0];
          sessionStorage.setItem('mailserver_session', JSON.stringify({ username: username, loggedIn: true }));
          window.location.href = '/dashboard';
        })
        .catch(function(error) {
          btn.disabled = false;
          success.style.display = 'none';
          error.textContent = 'Invalid email or password. Please try again.';
          error.style.display = 'block';
        });
    });

    var claimed = sessionStorage.getItem('mailserver_claim');
    if (claimed) {
      document.getElementById('email').value = claimed + '@mailserver.life';
      sessionStorage.removeItem('mailserver_claim');
    }
  </script>

</body>
</html>
