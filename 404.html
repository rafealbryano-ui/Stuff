<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <script>
    var path = window.location.pathname;
    var fullPath = window.location.pathname + window.location.search;
    
    if (path.startsWith('/app/')) {
      var page = path.replace('/app/', '');
      if (page.includes('/')) {
        var parts = page.split('/');
        var mainPage = parts[0];
        var tab = parts[1] || '';
        if (mainPage === 'settings' && tab) {
          window.location.replace('/dashboard.html?page=' + mainPage + '&tab=' + tab);
        } else {
          window.location.replace('/dashboard.html?page=' + page);
        }
      } else {
        window.location.replace('/dashboard.html?page=' + page);
      }
    } else if (path === '/' || path === '') {
      window.location.replace('/index.html');
    } else if (!path.includes('.') && path !== '/') {
      window.location.replace(path + '.html');
    }
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
