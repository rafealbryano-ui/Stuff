<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting...</title>
<script>
(function() {
  var path = window.location.pathname;
  var username = null;
  if (path.startsWith('/user/')) {
    username = path.replace('/user/', '');
    if (username.endsWith('/')) username = username.slice(0, -1);
    if (username.endsWith('.html')) username = username.slice(0, -5);
  }
  if (username) {
    window.location.href = '/user.html?username=' + encodeURIComponent(username);
  } else {
    window.location.href = '/';
  }
})();
</script>
</head>
<body>
</body>
</html>
