<div class="profile-bg-overlay" id="profileBgOverlay"></div>
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loadingText">Loading mailserver.life...</div>
</div>
<div id="root"></div>
<script>
var firebaseConfig = {
  apiKey: "AIzaSyC1xj2lQYZoiu7h-orFfGlOy2i54Y2BMdA",
  authDomain: "mailserver-life.firebaseapp.com",
  projectId: "mailserver-life",
  storageBucket: "mailserver-life.firebasestorage.app",
  messagingSenderId: "195734676668",
  appId: "1:195734676668:web:40a868601cbaf8d473dcb9",
  measurementId: "G-V216FC1QMD"
};
firebase.initializeApp(firebaseConfig);
var auth = firebase.auth();
var db = firebase.firestore();
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

// Check if we're on a profile page and update loading text
var initialPath = window.location.pathname;
if (initialPath.startsWith('/user/')) {
  var loadingTextEl = document.getElementById('loadingText');
  if (loadingTextEl) loadingTextEl.textContent = 'Loading profile...';
}

var ENCRYPTION_KEY = 'LHKDATA_Center40104';
var STORAGE_KEY = 'mailserver_data';
var animationStarted = false;
var isRendering = false;
var initialLoad = true;
var snapshotUnsubscribe = null;
var renderTimeout = null;
var D = 'mailserver.life';
var loggedInUser = null;

function getStorage() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { users: {}, version: ENCRYPTION_KEY };
    var data = JSON.parse(raw);
    if (data.version !== ENCRYPTION_KEY) {
      return { users: {}, version: ENCRYPTION_KEY };
    }
    return data;
  } catch (e) {
    return { users: {}, version: ENCRYPTION_KEY };
  }
}

function getUsers() {
  return getStorage().users || {};
}

function getSession() {
  try {
    var raw = sessionStorage.getItem('mailserver_session');
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) {
    return null;
  }
}

function isLoggedIn() {
  var s = getSession();
  if (!s) return false;
  return !!s.username;
}

function updateNav() {
  var actions = document.getElementById('navActions');
  var loggedIn = isLoggedIn();
  if (loggedIn) {
    actions.innerHTML = '<a href="/inbox.html" style="text-decoration:none;"><button class="btn-nav btn-dashboard">Dashboard</button></a><button class="btn-nav btn-inbox" onclick="logout()">Logout</button>';
  } else {
    actions.innerHTML = '<a href="/login.html" style="text-decoration:none;"><button class="btn-nav btn-login">Log in</button></a><a href="/signup.html" style="text-decoration:none;"><button class="btn-nav btn-signup">Sign up</button></a>';
  }
  updateClaimButton();
}

function updateClaimButton() {
  var claimBtn = document.getElementById('claimBtn');
  var claimInput = document.getElementById('claimInput');
  var loggedIn = isLoggedIn();
  if (claimBtn) {
    if (loggedIn) {
      claimBtn.textContent = 'Dashboard';
      claimBtn.className = 'claim-btn dashboard-btn';
    } else {
      claimBtn.textContent = 'Claim';
      claimBtn.className = 'claim-btn';
    }
  }
  if (claimInput && loggedIn) {
    claimInput.disabled = true;
    claimInput.placeholder = 'You are signed in';
    claimInput.style.opacity = '0.5';
  } else if (claimInput) {
    claimInput.disabled = false;
    claimInput.placeholder = 'username';
    claimInput.style.opacity = '1';
  }
}

function logout() {
  auth.signOut().then(function() {
    sessionStorage.removeItem('mailserver_session');
    loggedInUser = null;
    updateNav();
    updateClaimButton();
    var input = document.getElementById('claimInput');
    if (input) {
      input.disabled = false;
      input.placeholder = 'username';
      input.style.opacity = '1';
      input.value = '';
    }
    window.location.href = '/';
  });
}

var cachedUserCount = 0;

function updateUserCount(count) {
  var userCount = count || 0;
  cachedUserCount = userCount;
  var uc = document.getElementById('userCount');
  var ucs = document.getElementById('userCountStat');
  if (uc) uc.textContent = userCount;
  if (ucs) ucs.textContent = userCount;
  var dcs = document.getElementById('domainCountStat');
  if (dcs) dcs.textContent = 1;
  var pvs = document.getElementById('profileViewsStat');
  if (pvs) pvs.textContent = 0;
}

function renderMemberCards() {
  if (isRendering) return;
  isRendering = true;
  
  var track = document.getElementById('track');
  if (!track) { isRendering = false; return; }
  
  db.collection('handles').orderBy('userNumber', 'asc').get().then(function(snapshot) {
    var handles = [];
    snapshot.forEach(function(doc) {
      var data = doc.data();
      handles.push({
        username: data.username,
        displayName: data.displayName || data.username,
        bio: data.bio || 'No bio yet.',
        userNumber: data.userNumber || 0,
        ownerUid: data.ownerUid,
        avatarUrl: data.avatarUrl || ''
      });
    });

    if (handles.length === 0) {
      track.innerHTML = '<div style="color:#444;font-size:13px;padding:20px;text-align:center;width:100%">No users yet. Be the first!</div>';
      track.style.justifyContent = 'center';
      isRendering = false;
      if (initialLoad) {
        initialLoad = false;
        var overlay = document.getElementById('loadingOverlay');
        if (overlay) overlay.classList.add('hidden');
      }
      return;
    }

    var clonesNeeded = Math.max(10, Math.ceil(20 / handles.length));
    var allCards = [];
    for (var c = 0; c < clonesNeeded; c++) {
      allCards = allCards.concat(handles);
    }

    var html = '';
    for (var i = 0; i < allCards.length; i++) {
      var h = allCards[i];
      var num = h.userNumber;
      var avatarHtml = '';
      if (h.avatarUrl) {
        avatarHtml = '<img src="' + h.avatarUrl + '" alt="' + h.username + '">';
      } else {
        avatarHtml = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>';
      }
      html += '<div class="member-card" onclick="window.location.href=\'/user/' + h.username + '\'">';
      html += '<div class="member-num">#' + num + '</div>';
      html += '<div class="member-avatar">' + avatarHtml + '</div>';
      html += '<div class="member-name">' + h.username + '</div>';
      html += '<div class="member-handle">@' + h.username + '</div>';
      html += '<div class="member-bio">' + h.bio + '</div>';
      html += '</div>';
    }
    track.innerHTML = html;
    track.style.justifyContent = 'flex-start';
    track.classList.remove('paused');
    
    var totalWidth = 0;
    var cards = track.querySelectorAll('.member-card');
    cards.forEach(function(card) {
      totalWidth += card.offsetWidth + 10;
    });
    
    var trackWidth = totalWidth / 2;
    track.style.width = trackWidth + 'px';
    track.style.transform = 'translateX(0)';
    
    if (!animationStarted) {
      track.style.animation = 'none';
      track.offsetHeight;
      var duration = Math.max(handles.length * 3 + 15, 30);
      track.style.animation = 'marqueeScroll ' + duration + 's linear infinite';
      animationStarted = true;
    } else {
      var duration = Math.max(handles.length * 3 + 15, 30);
      track.style.animation = 'marqueeScroll ' + duration + 's linear infinite';
    }
    
    updateUserCount(handles.length);
    isRendering = false;
    
    if (initialLoad) {
      initialLoad = false;
      var overlay = document.getElementById('loadingOverlay');
      if (overlay) overlay.classList.add('hidden');
    }

  }).catch(function(err) {
    console.error('Error loading handles:', err);
    if (track) {
      track.innerHTML = '<div style="color:#444;font-size:13px;padding:20px;text-align:center;width:100%">Unable to load users.</div>';
      track.style.justifyContent = 'center';
    }
    isRendering = false;
    if (initialLoad) {
      initialLoad = false;
      var overlay = document.getElementById('loadingOverlay');
      if (overlay) overlay.classList.add('hidden');
    }
  });
}

function debouncedRender() {
  if (renderTimeout) {
    clearTimeout(renderTimeout);
  }
  renderTimeout = setTimeout(function() {
    renderTimeout = null;
    renderMemberCards();
  }, 300);
}

var canvas, ctx, particles;
function initParticles() {
  canvas = document.getElementById('particle-canvas');
  if (!canvas) return;
  ctx = canvas.getContext('2d');
  function resizeCanvas() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  particles = [];
  for (var i = 0; i < 70; i++) {
    particles.push({
      x: Math.random(),
      y: Math.random(),
      r: Math.random() * 1.4 + 0.3,
      vx: (Math.random() - 0.5) * 0.0003,
      vy: (Math.random() - 0.5) * 0.0003,
      pulse: Math.random() * Math.PI * 2
    });
  }
  function drawParticles() {
    var W = canvas.width;
    var H = canvas.height;
    if (!W || !H) { requestAnimationFrame(drawParticles); return; }
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = 'rgba(90,60,180,0.04)';
    ctx.lineWidth = 0.5;
    for (var gx = 0; gx < W; gx += 60) { ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke(); }
    for (var gy = 0; gy < H; gy += 60) { ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke(); }
    var ag = ctx.createRadialGradient(W * 0.75, H * 0.5, 0, W * 0.75, H * 0.5, H * 0.65);
    ag.addColorStop(0, 'rgba(70,45,150,0.2)');
    ag.addColorStop(0.5, 'rgba(40,25,100,0.08)');
    ag.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = ag;
    ctx.fillRect(0, 0, W, H);
    var t = Date.now() * 0.001;
    var scanY = ((t * 45) % H);
    var sl = ctx.createLinearGradient(0, scanY - 20, 0, scanY + 3);
    sl.addColorStop(0, 'rgba(110,80,255,0)');
    sl.addColorStop(1, 'rgba(110,80,255,0.045)');
    ctx.fillStyle = sl;
    ctx.fillRect(0, scanY - 20, W, 23);
    for (var j = 0; j < particles.length; j++) {
      var p = particles[j];
      p.x = (p.x + p.vx + 1) % 1;
      p.y = (p.y + p.vy + 1) % 1;
      p.pulse += 0.018;
      var alpha = (Math.sin(p.pulse) * 0.35 + 0.65) * 0.65;
      ctx.beginPath();
      ctx.arc(p.x * W, p.y * H, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(155,120,255,' + alpha + ')';
      ctx.fill();
    }
    var vg = ctx.createRadialGradient(W * 0.5, H * 0.5, H * 0.1, W * 0.5, H * 0.5, H * 0.8);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(0,0,0,0.6)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);
    requestAnimationFrame(drawParticles);
  }
  drawParticles();
}

function getUsernameFromPath(path) {
  if (path.startsWith('/user/')) {
    var username = path.replace('/user/', '');
    if (username.endsWith('/')) username = username.slice(0, -1);
    if (username.endsWith('.html')) username = username.slice(0, -5);
    return username;
  }
  return null;
}

function loadProfile(username) {
  var container = document.getElementById('profileContainer');
  var mainContent = document.getElementById('mainContent');
  var bgOverlay = document.getElementById('profileBgOverlay');
  
  if (!container) {
    renderHome();
    container = document.getElementById('profileContainer');
    bgOverlay = document.getElementById('profileBgOverlay');
  }
  
  if (mainContent) mainContent.style.display = 'none';
  if (bgOverlay) {
    bgOverlay.classList.add('show');
    bgOverlay.style.backgroundImage = '';
    bgOverlay.style.backgroundColor = '#0a0a0a';
  }
  if (container) {
    container.classList.add('show');
    container.innerHTML = '<div style="padding:40px 20px;text-align:center;color:#888;display:flex;flex-direction:column;align-items:center;gap:12px"><span class="loading-spinner" style="width:24px;height:24px;border-width:3px;display:inline-block;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite"></span><span>Loading profile...</span></div>';
  }
  
  db.collection('handles').doc(username).get()
    .then(function(doc) {
      if (!doc.exists) {
        container.innerHTML = '<div style="padding:40px 20px;text-align:center;color:#888">User @' + username + ' not found.</div>';
        return;
      }
      var handleData = doc.data();
      var ownerUid = handleData.ownerUid;
      return db.collection('users').doc(ownerUid).get().then(function(userDoc) {
        if (!userDoc.exists) {
          var currentViews = handleData.views || 0;
          var newViews = currentViews + 1;
          return db.collection('handles').doc(username).update({ views: newViews })
            .then(function() {
              handleData.views = newViews;
              renderProfile(container, handleData, [], null, null, handleData.userNumber || 0);
            });
        }
        var userData = userDoc.data();
        var currentViews = handleData.views || 0;
        var newViews = currentViews + 1;
        return db.collection('handles').doc(username).update({ views: newViews })
          .then(function() {
            handleData.views = newViews;
            return db.collection('handles').where('ownerUid', '==', ownerUid).get()
              .then(function(snapshot) {
                var allHandles = [];
                snapshot.forEach(function(d) {
                  allHandles.push(d.data());
                });
                allHandles.sort(function(a, b) {
                  return (a.userNumber || 0) - (b.userNumber || 0);
                });
                var backgroundUrl = userData.backgroundUrl || '';
                var accentColor = userData.accentColor || '#000000';
                var settings = userData.settings || {};
                var userNumber = userData.userNumber || handleData.userNumber || 0;
                renderProfile(container, handleData, allHandles, backgroundUrl, accentColor, settings, userNumber);
              });
          });
      });
    })
    .catch(function(err) {
      container.innerHTML = '<div style="padding:40px 20px;text-align:center;color:#888">Error loading profile.</div>';
      console.error(err);
    });
}

function renderProfile(container, handleData, allHandles, backgroundUrl, accentColor, settings, userNumber) {
  var avatarUrl = handleData.avatarUrl || '';
  var displayName = handleData.displayName || handleData.username;
  var bio = handleData.bio || 'No bio yet.';
  var ownerUid = handleData.ownerUid;
  var username = handleData.username;
  var views = handleData.views || 0;
  var accent = accentColor || '#000000';
  var number = userNumber || handleData.userNumber || 0;
  
  var glowEnabled = settings && settings.glowEnabled || false;
  var glowGlow = settings && settings.glowGlow || false;
  var glowText = settings && settings.glowText || false;
  var glowIcons = settings && settings.glowIcons || false;

  var bgOverlay = document.getElementById('profileBgOverlay');
  if (bgOverlay) {
    if (backgroundUrl) {
      bgOverlay.style.backgroundImage = 'url("' + backgroundUrl + '")';
      bgOverlay.style.backgroundColor = 'transparent';
      bgOverlay.classList.add('show');
    } else {
      bgOverlay.classList.remove('show');
      bgOverlay.style.backgroundImage = '';
      bgOverlay.style.backgroundColor = '#0a0a0a';
    }
  }

  var aliases = allHandles && allHandles.length ? allHandles.filter(function(h) {
    return h.ownerUid === ownerUid && h.username !== username;
  }) : [];

  var avatarHtml = '';
  if (avatarUrl) {
    avatarHtml = '<img src="' + avatarUrl + '" alt="' + displayName + '" style="width:100px;height:100px;border-radius:50%;object-fit:cover;border:2px solid ' + accent + '">';
  } else {
    var initial = displayName ? displayName[0].toUpperCase() : username[0].toUpperCase();
    avatarHtml = '<span style="font-size:36px;font-weight:700;color:#e8e8e8">' + initial + '</span>';
  }

  var tagsHtml = '';
  if (aliases.length > 0) {
    aliases.forEach(function(a) {
      tagsHtml += '<span class="profile-tag"><a href="/user/' + a.username + '">@' + a.username + '</a></span>';
    });
  }

  var cardStyle = '';
  var ringStyle = 'border-color:' + accent + ';';
  var numberStyle = 'border-color:' + accent + ';color:#e8e8e8;';
  var handleStyle = '';
  var tagsStyle = '';

  if (glowEnabled) {
    if (glowGlow) {
      cardStyle += 'box-shadow: 0 0 50px ' + accent + '60, 0 0 100px ' + accent + '30;';
      ringStyle += 'box-shadow: 0 0 40px ' + accent + '80, 0 0 80px ' + accent + '40;';
      numberStyle += 'box-shadow: 0 0 20px ' + accent + '60;';
    }
    if (glowText) {
      handleStyle += 'text-shadow: 0 0 30px ' + accent + '90, 0 0 60px ' + accent + '50;';
    }
    if (glowIcons) {
      tagsStyle += 'filter: drop-shadow(0 0 15px ' + accent + ');';
    }
  }

  var html = '';
  html += '<div class="profile-card" style="' + cardStyle + '">';
  html += '  <div class="profile-number" style="' + numberStyle + '">#' + number + '</div>';
  html += '  <div class="profile-top">';
  html += '    <div class="profile-avatar-ring" style="' + ringStyle + '">';
  html += '      <div class="profile-avatar-inner">' + avatarHtml + '</div>';
  html += '    </div>';
  html += '    <div class="profile-handle" style="' + handleStyle + '">@' + username + '</div>';
  html += '    <div class="profile-bio">' + bio + '</div>';
  html += '    <div class="profile-tags" style="' + tagsStyle + '">' + tagsHtml + '</div>';
  html += '  </div>';
  html += '  <div class="profile-footer">';
  html += '    <span class="views">' + views + ' VIEWS</span>';
  html += '    <span class="domain">' + D.toUpperCase() + '</span>';
  html += '  </div>';
  html += '</div>';

  container.innerHTML = html;
  document.title = '@' + username + ' — mailserver.life';
  
  var overlay = document.getElementById('loadingOverlay');
  if (overlay) overlay.classList.add('hidden');
}

function handleRoute() {
  var path = window.location.pathname;
  var mainContent = document.getElementById('mainContent');
  var profileContainer = document.getElementById('profileContainer');
  var bgOverlay = document.getElementById('profileBgOverlay');
  
  if (path.startsWith('/user/')) {
    var username = getUsernameFromPath(path);
    if (mainContent) mainContent.style.display = 'none';
    if (bgOverlay) bgOverlay.classList.add('show');
    if (profileContainer) {
      profileContainer.classList.add('show');
      loadProfile(username);
    } else {
      renderHome();
      var newContainer = document.getElementById('profileContainer');
      if (newContainer) {
        newContainer.classList.add('show');
        loadProfile(username);
      }
    }
  } else {
    if (mainContent) mainContent.style.display = 'block';
    if (profileContainer) {
      profileContainer.classList.remove('show');
      profileContainer.innerHTML = '';
    }
    if (bgOverlay) {
      bgOverlay.classList.remove('show');
      bgOverlay.style.backgroundImage = '';
      bgOverlay.style.backgroundColor = '#0a0a0a';
    }
    document.title = 'mailserver.life — Email that minds its own business.';
  }
}

window.onpopstate = function() {
  handleRoute();
};

if (initialPath.startsWith('/user/')) {
  renderHome();
  handleRoute();
} else {
  renderHome();
}
