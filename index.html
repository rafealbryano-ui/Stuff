<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mailserver.life</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0a0a;color:#e8e8e8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
    .app{max-width:1200px;margin:0 auto;padding:20px}
    .header{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #1a1a1a;margin-bottom:30px}
    .logo{font-size:20px;font-weight:700;color:#fff;text-decoration:none}
    .logo span{color:#5b8ef0}
    .nav a{color:#777;text-decoration:none;margin-left:20px;font-size:14px}
    .nav a:hover{color:#e8e8e8}
    .loading{text-align:center;padding:60px 20px;color:#555;font-size:14px}
    .loading-spinner{width:30px;height:30px;border:3px solid #1a1a1a;border-top-color:#5b8ef0;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .hidden{display:none}
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>
</head>
<body>
  <div id="app">
    <div class="header">
      <a href="/" class="logo">mailserver<span>.life</span></a>
      <div class="nav">
        <a href="#" onclick="navigate('/')">Home</a>
        <a href="#" onclick="navigate('/inbox')">Inbox</a>
        <a href="#" onclick="navigate('/settings')">Settings</a>
      </div>
    </div>
    <div id="content">
      <div class="loading">
        <div class="loading-spinner"></div>
        Loading...
      </div>
    </div>
  </div>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyC1xj2lQYZoiu7h-orFfGlOy2i54Y2BMdA",
  authDomain: "mailserver-life.firebaseapp.com",
  projectId: "mailserver-life",
  storageBucket: "mailserver-life.firebasestorage.app",
  messagingSenderId: "195734676668",
  appId: "1:195734676668:web:40a868601cbaf8d473dcb9",
  measurementId: "G-V216FC1QMD"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

var D = 'mailserver.life';

function getRoute() {
  var path = window.location.pathname;
  var search = window.location.search;
  var params = new URLSearchParams(search);
  if (path.startsWith('/user/')) {
    var username = path.replace('/user/', '');
    if (username.endsWith('/')) username = username.slice(0, -1);
    if (username.endsWith('.html')) username = username.slice(0, -5);
    return { type: 'user', username: username };
  }
  if (path === '/' || path === '') return { type: 'home' };
  if (params.get('u')) return { type: 'user', username: params.get('u') };
  return { type: 'page', path: path };
}

function navigate(url) {
  window.history.pushState({}, '', url);
  renderRoute();
}

function renderRoute() {
  var route = getRoute();
  var content = document.getElementById('content');
  
  if (route.type === 'home') {
    loadHomePage(content);
  } else if (route.type === 'user') {
    loadUserProfile(content, route.username);
  } else if (route.type === 'page') {
    var page = route.path;
    if (page === '/inbox') page = '/inbox.html';
    else if (page === '/settings') page = '/settings.html';
    else if (page === '/login') page = '/login.html';
    else if (page === '/signup') page = '/signup.html';
    else page = page + '.html';
    fetchPage(content, page);
  }
}

function fetchPage(container, url) {
  container.innerHTML = '<div class="loading"><div class="loading-spinner"></div>Loading ' + url + '...</div>';
  fetch(url)
    .then(function(res) {
      if (!res.ok) {
        container.innerHTML = '<div style="color:#888;padding:60px 20px;text-align:center">Page not found.</div>';
        return;
      }
      return res.text();
    })
    .then(function(html) {
      if (html) {
        var parser = new DOMParser();
        var doc = parser.parseFromString(html, 'text/html');
        var bodyContent = doc.body.innerHTML;
        var styleContent = doc.querySelector('style');
        var styleHtml = styleContent ? styleContent.outerHTML : '';
        var title = doc.querySelector('title');
        if (title) document.title = title.textContent;
        container.innerHTML = styleHtml + bodyContent;
        executeScripts(container);
      }
    })
    .catch(function(err) {
      container.innerHTML = '<div style="color:#888;padding:60px 20px;text-align:center">Error loading page.</div>';
      console.error(err);
    });
}

function executeScripts(container) {
  var scripts = container.querySelectorAll('script');
  scripts.forEach(function(oldScript) {
    var newScript = document.createElement('script');
    for (var attr of oldScript.attributes) {
      newScript.setAttribute(attr.name, attr.value);
    }
    newScript.textContent = oldScript.textContent;
    oldScript.parentNode.replaceChild(newScript, oldScript);
  });
}

function loadHomePage(container) {
  fetch('/index.html')
    .then(function(res) { return res.text(); })
    .then(function(html) {
      var parser = new DOMParser();
      var doc = parser.parseFromString(html, 'text/html');
      var mainContent = doc.querySelector('.hero') || doc.querySelector('.members-scroll');
      if (mainContent) {
        container.innerHTML = mainContent.outerHTML;
        var style = doc.querySelector('style');
        if (style) container.innerHTML = style.outerHTML + container.innerHTML;
        var scripts = doc.querySelectorAll('script');
        scripts.forEach(function(s) {
          if (s.src && s.src.includes('firebase')) return;
          var newScript = document.createElement('script');
          newScript.textContent = s.textContent;
          container.appendChild(newScript);
        });
      } else {
        container.innerHTML = html;
      }
      document.title = 'mailserver.life — Email that minds its own business.';
    })
    .catch(function(err) {
      container.innerHTML = '<div style="color:#888;padding:60px 20px;text-align:center">Error loading home page.</div>';
    });
}

function loadUserProfile(container, username) {
  container.innerHTML = '<div class="loading"><div class="loading-spinner"></div>Loading @' + username + '...</div>';
  
  db.collection('handles').doc(username).get()
    .then(function(doc) {
      if (!doc.exists) {
        container.innerHTML = '<div style="color:#888;padding:60px 20px;text-align:center">User @' + username + ' not found.</div>';
        return;
      }
      var handleData = doc.data();
      return db.collection('handles').where('ownerUid', '==', handleData.ownerUid).get()
        .then(function(snapshot) {
          var allHandles = [];
          snapshot.forEach(function(d) {
            allHandles.push(d.data());
          });
          allHandles.sort(function(a, b) {
            return (a.userNumber || 0) - (b.userNumber || 0);
          });
          renderProfile(container, handleData, allHandles);
        });
    })
    .catch(function(err) {
      container.innerHTML = '<div style="color:#888;padding:60px 20px;text-align:center">Error loading profile.</div>';
      console.error(err);
    });
}

function renderProfile(container, handleData, allHandles) {
  var avatarUrl = handleData.avatarUrl || '';
  var displayName = handleData.displayName || handleData.username;
  var bio = handleData.bio || 'No bio yet.';
  var userNumber = handleData.userNumber || 0;
  var ownerUid = handleData.ownerUid;
  var username = handleData.username;

  var aliases = allHandles.filter(function(h) {
    return h.ownerUid === ownerUid && h.username !== username;
  });

  var avatarHtml = '';
  if (avatarUrl) {
    avatarHtml = '<img src="' + avatarUrl + '" alt="' + displayName + '">';
  } else {
    var initial = displayName ? displayName[0].toUpperCase() : username[0].toUpperCase();
    avatarHtml = initial;
  }

  var tagsHtml = '';
  if (aliases.length > 0) {
    aliases.forEach(function(a) {
      tagsHtml += '<span class="tag"><a href="#" onclick="navigate(\'/user/' + a.username + '\');return false;">@' + a.username + '</a></span>';
    });
  } else {
    tagsHtml = '<span class="tag" style="color:#555;border-color:#2a2a2a">No aliases</span>';
  }

  var html = '';
  html += '<style>';
  html += '*{box-sizing:border-box;margin:0;padding:0}';
  html += 'body{background:#0d0d0d;font-family:"JetBrains Mono",monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}';
  html += '.page{width:100%;max-width:500px;display:flex;flex-direction:column;align-items:center;gap:24px}';
  html += '.card{width:100%;background:#131313;border:1px solid #222;border-radius:16px;overflow:hidden}';
  html += '.card-top{padding:24px 20px 20px;display:flex;flex-direction:column;align-items:center}';
  html += '.card-badge{font-size:11px;color:#888;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:20px;padding:3px 12px;margin-bottom:14px;letter-spacing:.02em}';
  html += '.avatar-ring{width:96px;height:96px;border-radius:50%;background:radial-gradient(circle at 50% 60%,#1a1a1a 55%,#333 80%,#555 100%);display:flex;align-items:center;justify-content:center;margin-bottom:14px;box-shadow:0 0 0 1px #333,0 0 20px rgba(255,255,255,0.06)}';
  html += '.avatar-inner{width:78px;height:78px;border-radius:50%;background:#181818;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#e8e8e8;overflow:hidden}';
  html += '.avatar-inner img{width:100%;height:100%;object-fit:cover}';
  html += '.handle{font-size:16px;color:#e0e0e0;font-weight:500;letter-spacing:.01em;margin-bottom:4px}';
  html += '.bio{font-size:12px;color:#888;margin:8px 0 14px;text-align:center;max-width:280px;line-height:1.5}';
  html += '.tags{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:4px}';
  html += '.tag{font-size:11px;color:#e0e0e0;background:#222;border:1px solid #3a3a3a;border-radius:20px;padding:3px 10px;cursor:pointer;transition:background .15s}';
  html += '.tag:hover{background:#2a2a2a}';
  html += '.tag a{color:#e0e0e0;text-decoration:none}';
  html += '.tag a:hover{color:#fff}';
  html += '.card-footer{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-top:1px solid #1c1c1c}';
  html += '.footer-views{font-size:10px;color:#444;letter-spacing:.08em;text-transform:uppercase}';
  html += '.footer-brand{font-size:10px;color:#444;letter-spacing:.08em;text-transform:uppercase}';
  html += '.back-link{color:#555;font-size:12px;text-decoration:none;border:1px solid #2a2a2a;padding:6px 16px;border-radius:20px;transition:border .15s;margin-top:8px}';
  html += '.back-link:hover{border-color:#555}';
  html += '.header{width:100%;display:flex;justify-content:space-between;align-items:center;padding:0 4px 8px}';
  html += '.header a{color:#555;font-size:13px;text-decoration:none;border:1px solid #2a2a2a;padding:6px 14px;border-radius:20px;transition:border .15s}';
  html += '.header a:hover{border-color:#555}';
  html += '@media(max-width:500px){.card-top{padding:16px 12px 14px}.avatar-ring{width:80px;height:80px}.avatar-inner{width:64px;height:64px;font-size:22px}}';
  html += '</style>';

  html += '<div class="page">';
  html += '<div class="header">';
  html += '  <a href="#" onclick="navigate(\'/\');return false;">← Home</a>';
  html += '  <span style="color:#333;font-size:11px">' + D + '</span>';
  html += '</div>';
  html += '<div class="card">';
  html += '  <div class="card-top">';
  html += '    <div class="card-badge">#' + userNumber + ' · ' + D + '</div>';
  html += '    <div class="avatar-ring">';
  html += '      <div class="avatar-inner">' + avatarHtml + '</div>';
  html += '    </div>';
  html += '    <div class="handle">@' + username + '</div>';
  html += '    <div class="bio">' + bio + '</div>';
  html += '    <div class="tags">' + tagsHtml + '</div>';
  html += '  </div>';
  html += '  <div class="card-footer">';
  html += '    <span class="footer-views">' + aliases.length + ' aliases</span>';
  html += '    <span class="footer-brand">' + D + '</span>';
  html += '  </div>';
  html += '</div>';
  html += '</div>';

  container.innerHTML = html;
  document.title = '@' + username + ' — mailserver.life';
  window.history.pushState({ username: username }, '', '/user/' + username);
}

window.onpopstate = function() {
  renderRoute();
};

renderRoute();

var currentPath = window.location.pathname;
if (currentPath.startsWith('/user/') && !currentPath.includes('.html')) {
}
</script>
</body>
</html>
