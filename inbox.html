<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Inbox — mailserver.life</title><script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script><style>*{box-sizing:border-box;margin:0;padding:0}:root{--ms-bg:#0a0a0a;--ms-surface:#111111;--ms-card:#181818;--ms-border:#2a2a2a;--ms-border-hover:#3a3a3a;--ms-text:#e8e8e8;--ms-muted:#888;--ms-accent:#4f7cff;--ms-accent-dim:#1a2a6e;--ms-danger:#e24b4a;--ms-success:#1d9e75;--ms-mono:'JetBrains Mono',monospace;--ms-sans:'Inter',sans-serif}body{background:var(--ms-bg);color:var(--ms-text);font-family:var(--ms-sans);font-size:14px;min-height:100vh}a{color:var(--ms-accent);text-decoration:none}a:hover{text-decoration:underline}.header{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:48px;border-bottom:1px solid var(--ms-border);background:var(--ms-bg);position:sticky;top:0;z-index:100}.logo{font-family:var(--ms-mono);font-size:15px;font-weight:700;color:var(--ms-text)}.logo span{color:var(--ms-accent)}.header-nav{display:flex;gap:8px}.btn{font-family:var(--ms-sans);font-size:13px;font-weight:500;padding:6px 14px;border-radius:6px;cursor:pointer;transition:background .15s,border-color .15s}.btn-outline{background:transparent;border:1px solid var(--ms-border);color:var(--ms-text)}.btn-outline:hover{border-color:var(--ms-border-hover);background:#1f1f1f}.btn-primary{background:var(--ms-accent);border:1px solid var(--ms-accent);color:#fff}.btn-primary:hover{background:#3d6aee}.btn-danger{background:transparent;border:1px solid var(--ms-danger);color:var(--ms-danger)}.btn-danger:hover{background:rgba(226,75,74,.1)}.layout{display:flex;min-height:calc(100vh - 48px)}.sidebar{width:200px;min-width:200px;border-right:1px solid var(--ms-border);padding:16px 0;background:var(--ms-bg)}.sidebar-item{display:flex;align-items:center;gap:10px;padding:9px 20px;font-size:13px;color:var(--ms-muted);cursor:pointer;transition:color .15s,background .15s}.sidebar-item:hover{color:var(--ms-text);background:#161616}.sidebar-item.active{color:var(--ms-text);background:#1a1a2e;border-right:2px solid var(--ms-accent)}.sidebar-item i{font-size:16px}.sidebar-section{font-size:11px;color:var(--ms-muted);padding:16px 20px 4px;letter-spacing:.08em;text-transform:uppercase}.main{flex:1;overflow-y:auto}.inbox-bar{display:flex;align-items:center;gap:12px;padding:16px 32px;border-bottom:1px solid var(--ms-border)}.inbox-search{flex:1;position:relative}.inbox-search input{padding-left:36px;width:100%;background:#0e0e0e;border:1px solid var(--ms-border);border-radius:6px;padding:8px 12px;color:var(--ms-text);font-family:var(--ms-sans);font-size:13px;outline:none}.inbox-search input:focus{border-color:var(--ms-accent)}.inbox-search i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ms-muted);font-size:16px}.msg-item{display:flex;align-items:center;gap:16px;padding:12px 32px;border-bottom:1px solid var(--ms-border);cursor:pointer;transition:background .1s;position:relative}.msg-item:hover{background:#141414}.msg-item .msg-delete{display:none;margin-left:auto}.msg-item:hover .msg-delete{display:block}.msg-dot{width:8px;height:8px;border-radius:50%;background:var(--ms-accent);flex-shrink:0}.msg-dot.read{background:transparent}.msg-from{width:160px;flex-shrink:0;font-size:13px;color:var(--ms-text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.msg-subject{flex:1;font-size:13px;color:var(--ms-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.msg-time{font-size:12px;color:var(--ms-muted);flex-shrink:0}.msg-item.unread .msg-from{font-weight:600}.msg-item.unread .msg-subject{color:var(--ms-text);font-weight:500}.empty-inbox{text-align:center;padding:60px 32px;color:var(--ms-muted)}.empty-inbox i{font-size:40px;margin-bottom:12px;display:block;color:#333}.toast{position:fixed;bottom:20px;right:20px;background:#1f1f2e;border:1px solid var(--ms-accent);border-radius:8px;padding:12px 18px;font-size:13px;color:var(--ms-text);z-index:999;opacity:0;transform:translateY(10px);transition:opacity .3s,transform .3s;pointer-events:none}.toast.show{opacity:1;transform:translateY(0)}.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:999;align-items:center;justify-content:center}.modal-overlay.show{display:flex}.modal{background:var(--ms-card);border:1px solid var(--ms-border);border-radius:12px;padding:24px;max-width:500px;width:90%}.modal-title{font-size:18px;font-weight:600;margin-bottom:16px;color:var(--ms-text)}.modal input,.modal textarea{width:100%;background:#0e0e0e;border:1px solid var(--ms-border);border-radius:6px;padding:10px 12px;color:var(--ms-text);margin-bottom:12px;font-family:var(--ms-sans);font-size:13px}.modal textarea{min-height:120px;resize:vertical}.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}.btn-sm{font-size:12px;padding:4px 10px;border-radius:4px}</style><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"></head><body><div style="min-height:100vh;background:#0a0a0a"><header class="header"><a href="/" class="logo">mailserver<span>.life</span></a><nav class="header-nav"><a href="/inbox" class="btn btn-outline">Inbox</a><a href="/settings" class="btn btn-outline">Settings</a><button class="btn btn-outline" onclick="logout()">Logout</button></nav></header><div class="layout"><aside class="sidebar"><div class="sidebar-section">Mail</div><a href="/inbox" class="sidebar-item active"><i class="ti ti-inbox"></i> Inbox<span id="unread-badge" style="margin-left:auto;background:var(--ms-accent);color:#fff;font-size:11px;padding:1px 6px;border-radius:10px">0</span></a><a href="/sent" class="sidebar-item"><i class="ti ti-send"></i> Sent</a><a href="/tempmail" class="sidebar-item"><i class="ti ti-clock"></i> Temp mail</a><a href="/trash" class="sidebar-item"><i class="ti ti-trash"></i> Trash</a><div class="sidebar-section">Account</div><a href="/settings" class="sidebar-item"><i class="ti ti-settings"></i> Settings</a><a href="/files" class="sidebar-item"><i class="ti ti-file"></i> Files</a></aside><main class="main"><div class="inbox-bar"><div class="inbox-search"><i class="ti ti-search"></i><input type="text" placeholder="Search mail…" oninput="searchEmails(this.value)"></div><button class="btn btn-primary" onclick="openCompose()"><i class="ti ti-pencil-plus"></i>Compose</button><button class="btn btn-outline" onclick="loadEmails()"><i class="ti ti-refresh"></i>Refresh</button></div><div id="emailList"></div></main></div></div><div class="modal-overlay" id="composeModal"><div class="modal"><div class="modal-title">✏️ New Message</div><input type="text" id="composeTo" placeholder="To: any@email.com"><input type="text" id="composeSubject" placeholder="Subject"><textarea id="composeBody" placeholder="Write your message..."></textarea><div class="modal-actions"><button class="btn btn-outline" onclick="closeCompose()">Cancel</button><button class="btn btn-primary" onclick="sendCompose()">Send</button></div></div></div><div class="toast" id="toast-el"></div><script>var firebaseConfig={apiKey:"AIzaSyC1xj2lQYZoiu7h-orFfGlOy2i54Y2BMdA",authDomain:"mailserver-life.firebaseapp.com",projectId:"mailserver-life",storageBucket:"mailserver-life.firebasestorage.app",messagingSenderId:"195734676668",appId:"1:195734676668:web:40a868601cbaf8d473dcb9",measurementId:"G-V216FC1QMD"};firebase.initializeApp(firebaseConfig);var auth=firebase.auth();var db=firebase.firestore();auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);var D='mailserver.life';var USERNAME='';var USER_UID='';var msgs=[];var sentMsgs=[];var BREVO_API_KEY='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';auth.onAuthStateChanged(function(user){if(!user){window.location.href='/login';return;}USER_UID=user.uid;USERNAME=user.displayName||user.email.split('@')[0];console.log('👤 User:',USERNAME);loadEmails();loadSent();});function showToast(msg){var el=document.getElementById('toast-el');el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show')},3000);}function logout(){auth.signOut().then(function(){sessionStorage.removeItem('mailserver_session');window.location.href='/';});}function loadEmails(){var userEmail=USERNAME+'@'+D;console.log('📬 Loading emails for:',userEmail);db.collection('emails').where('to','==',userEmail).where('trash','==',false).get().then(function(snapshot){console.log('📧 Found',snapshot.size,'emails');msgs=[];snapshot.forEach(function(doc){var data=doc.data();var timeStr='Just now';if(data.sentAt&&data.sentAt.toDate){timeStr=new Date(data.sentAt.toDate()).toLocaleString();}msgs.push({id:doc.id,from:data.from||'unknown',subject:data.subject||'(no subject)',time:timeStr,unread:!data.read,body:data.body||''});});msgs.sort(function(a,b){return new Date(b.time)-new Date(a.time);});updateUnreadCount();renderInbox();}).catch(function(error){console.error('❌ Error loading emails:',error);showToast('Error loading emails: '+error.message);});}function loadSent(){var userEmail=USERNAME+'@'+D;db.collection('emails').where('from','==',userEmail).where('trash','==',false).get().then(function(snapshot){sentMsgs=[];snapshot.forEach(function(doc){var data=doc.data();var timeStr='Just now';if(data.sentAt&&data.sentAt.toDate){timeStr=new Date(data.sentAt.toDate()).toLocaleString();}sentMsgs.push({id:doc.id,to:data.to||'unknown',subject:data.subject||'(no subject)',time:timeStr,body:data.body||''});});sentMsgs.sort(function(a,b){return new Date(b.time)-new Date(a.time);});}).catch(function(error){console.error('Error loading sent:',error);});}function updateUnreadCount(){var unread=msgs.filter(function(m){return m.unread;}).length;document.getElementById('unread-badge').textContent=unread;}function renderInbox(){var container=document.getElementById('emailList');if(msgs.length===0){container.innerHTML='<div class="empty-inbox"><i class="ti ti-inbox"></i><div style="font-size:15px;font-weight:600;color:var(--ms-text);margin-bottom:6px">Your inbox is empty</div><div>Messages sent to @'+USERNAME+'@'+D+' will appear here.</div></div>';return;}var rows=msgs.map(function(m){var isUnread=m.unread?'unread':'';var dotClass=m.unread?'':'read';return '<div class="msg-item '+isUnread+'"><div class="msg-dot '+dotClass+'" onclick="openEmail(\''+m.id+'\')"></div><div class="msg-from" onclick="openEmail(\''+m.id+'\')">'+m.from+'</div><div class="msg-subject" onclick="openEmail(\''+m.id+'\')">'+m.subject+'</div><div class="msg-time" onclick="openEmail(\''+m.id+'\')">'+m.time+'</div><span class="msg-delete"><button class="btn btn-danger btn-sm" onclick="deleteEmail(\''+m.id+'\')"><i class="ti ti-trash"></i></button></span></div>';}).join('');container.innerHTML=rows;}function searchEmails(query){var filtered=msgs.filter(function(m){return m.subject.toLowerCase().includes(query.toLowerCase())||m.from.toLowerCase().includes(query.toLowerCase())||(m.body&&m.body.toLowerCase().includes(query.toLowerCase()));});var container=document.getElementById('emailList');if(filtered.length===0){container.innerHTML='<div class="empty-inbox" style="padding:40px 0"><i class="ti ti-search"></i><div style="font-size:15px;font-weight:600;color:var(--ms-text);margin-bottom:6px">No results found</div></div>';return;}var rows=filtered.map(function(m){var isUnread=m.unread?'unread':'';var dotClass=m.unread?'':'read';return '<div class="msg-item '+isUnread+'"><div class="msg-dot '+dotClass+'" onclick="openEmail(\''+m.id+'\')"></div><div class="msg-from" onclick="openEmail(\''+m.id+'\')">'+m.from+'</div><div class="msg-subject" onclick="openEmail(\''+m.id+'\')">'+m.subject+'</div><div class="msg-time" onclick="openEmail(\''+m.id+'\')">'+m.time+'</div><span class="msg-delete"><button class="btn btn-danger btn-sm" onclick="deleteEmail(\''+m.id+'\')"><i class="ti ti-trash"></i></button></span></div>';}).join('');container.innerHTML=rows;}function deleteEmail(id){if(confirm('Move this message to trash?')){db.collection('emails').doc(id).update({trash:true,trashedAt:firebase.firestore.FieldValue.serverTimestamp()}).then(function(){showToast('🗑️ Message moved to trash.');loadEmails();}).catch(function(error){showToast('Error: '+error.message);});}}function openEmail(id){var email=msgs.find(function(m){return m.id===id;});if(!email)return;if(email.unread){email.unread=false;db.collection('emails').doc(id).update({read:true});updateUnreadCount();}var modal=document.createElement('div');modal.className='modal-overlay show';modal.style.display='flex';modal.innerHTML='<div class="modal" style="max-width:600px"><div class="modal-title" style="margin-bottom:4px">'+email.subject+'</div><div style="font-size:13px;color:var(--ms-muted);margin-bottom:16px">From: '+email.from+' · '+email.time+'</div><div style="font-size:14px;color:var(--ms-text);line-height:1.8;white-space:pre-wrap;background:#0e0e0e;padding:16px;border-radius:6px;border:1px solid var(--ms-border);max-height:400px;overflow-y:auto">'+(email.body||'No content')+'</div><div class="modal-actions" style="margin-top:16px"><button class="btn btn-outline" onclick="this.closest(\'.modal-overlay\').remove()">Close</button><button class="btn btn-outline" onclick="replyEmail(\''+id+'\')">Reply</button><button class="btn btn-danger" onclick="deleteEmail(\''+id+'\');this.closest(\'.modal-overlay\').remove()">Delete</button></div></div>';document.body.appendChild(modal);}function replyEmail(id){var email=msgs.find(function(m){return m.id===id;});if(!email)return;document.querySelectorAll('.modal-overlay').forEach(function(el){el.remove();});openCompose();document.getElementById('composeTo').value=email.from;document.getElementById('composeSubject').value='Re: '+email.subject;document.getElementById('composeBody').value='\n\n--- Original message ---\nFrom: '+email.from+'\n'+email.body;}function openCompose(){document.getElementById('composeModal').classList.add('show');}function closeCompose(){document.getElementById('composeModal').classList.remove('show');document.getElementById('composeTo').value='';document.getElementById('composeSubject').value='';document.getElementById('composeBody').value='';}function sendViaBrevo(to,subject,body,fromEmail,docId){var data={sender:{email:fromEmail,name:USERNAME},to:[{email:to}],subject:subject,textContent:body,htmlContent:'<p>'+body.replace(/\n/g,'<br>')+'</p>'};console.log('📤 Sending via Brevo:',data);fetch('https://api.brevo.com/v3/smtp/email',{method:'POST',headers:{'Accept':'application/json','Content-Type':'application/json','api-key':BREVO_API_KEY},body:JSON.stringify(data)}).then(function(response){console.log('📬 Brevo status:',response.status);if(response.ok){return response.json();}else{return response.text().then(function(text){throw new Error('Brevo error: '+text);});}}).then(function(data){console.log('✅ Brevo success:',data);showToast('Email sent to '+to+' ✅');db.collection('emails').doc(docId).update({sentToExternal:true,messageId:data.messageId});closeCompose();loadEmails();loadSent();}).catch(function(error){console.error('❌ Brevo error:',error);showToast('Email saved but could not deliver to '+to);});}function sendCompose(){var to=document.getElementById('composeTo').value.trim();var subject=document.getElementById('composeSubject').value.trim();var body=document.getElementById('composeBody').value.trim();if(!to||!subject||!body){showToast('Please fill in all fields.');return;}if(!to.includes('@')){to=to+'@'+D;}var fromEmail=USERNAME+'@'+D;var isInternal=to.includes('mailserver.life');var emailData={from:fromEmail,to:to,subject:subject,body:body,sentAt:firebase.firestore.FieldValue.serverTimestamp(),read:false,trash:false,sentToExternal:false};db.collection('emails').add(emailData).then(function(docRef){console.log('📧 Email saved to Firestore:',docRef.id);if(isInternal){showToast('Email sent to '+to+' ✅');closeCompose();loadEmails();loadSent();}else{sendViaBrevo(to,subject,body,fromEmail,docRef.id);}}).catch(function(error){console.error('❌ Error saving email:',error);showToast('Error saving email: '+error.message);});}window.addEventListener('click',function(e){if(e.target.classList.contains('modal-overlay')){e.target.remove();}});document.addEventListener('keydown',function(e){if(e.key==='Escape'){document.querySelectorAll('.modal-overlay').forEach(function(el){el.remove();});}});</script></body></html>
