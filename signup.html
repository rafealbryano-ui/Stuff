<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up — mailserver.life</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:#0e0e0e;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;padding:40px 20px}
    .brand{text-align:center;margin-bottom:32px}
    .brand h1{font-size:32px;font-weight:700;color:#fff;letter-spacing:-0.5px}
    .brand p{font-size:13px;color:rgba(255,255,255,0.4);margin-top:6px}
    .card{width:100%;max-width:340px;background:#1a1a1a;border:0.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:28px 24px}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:6px}
    .input-wrap{display:flex;align-items:center;background:#111;border:0.5px solid rgba(255,255,255,0.1);border-radius:7px;overflow:hidden}
    .input-wrap:focus-within{border-color:rgba(255,255,255,0.3)}
    .input-wrap input{flex:1;background:transparent;border:none;outline:none;padding:10px 12px;color:#fff;font-size:14px;font-family:inherit}
    .input-wrap input::placeholder{color:rgba(255,255,255,0.15)}
    .show-btn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.35);font-size:12px;font-family:inherit;padding:0 12px;height:40px}
    .show-btn:hover{color:rgba(255,255,255,0.65)}
    .btn-create{width:100%;padding:11px;background:#fff;color:#000;border:none;border-radius:7px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:4px}
    .btn-create:hover{background:#e0e0e0}
    .btn-create:disabled{opacity:0.5;cursor:not-allowed}
    .footer{text-align:center;margin-top:18px;font-size:13px;color:rgba(255,255,255,0.35)}
    .footer a{color:#5b8ef0;text-decoration:none;font-weight:500}
    .footer a:hover{text-decoration:underline}
    .error-msg{color:#ff6b6b;font-size:12px;margin-top:4px;display:none;text-align:center}
    .success-msg{color:#5b8ef0;font-size:12px;margin-top:4px;display:none;text-align:center}
    .domain-hint{font-size:11px;color:rgba(255,255,255,0.25);margin-top:4px;text-align:right;padding-right:4px}
  </style>
</head>
<body>

  <div class="brand">
    <h1>mailserver.life</h1>
    <p>Private. Simple. Yours.</p>
  </div>

  <div class="card">
    <form id="signupForm">
      <div class="field">
        <label for="username">Username</label>
        <div class="input-wrap">
          <input type="text" id="username" name="username" autocomplete="username" placeholder="Choose a username" required />
        </div>
        <div class="domain-hint">@mailserver.life</div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password" autocomplete="new-password" placeholder="Create a password" required />
          <button class="show-btn" type="button" onclick="toggle('password', this)">Show</button>
        </div>
      </div>

      <div class="field">
        <label for="confirm">Confirm Password</label>
        <div class="input-wrap">
          <input type="password" id="confirm" name="confirm" autocomplete="new-password" placeholder="Confirm your password" required />
          <button class="show-btn" type="button" onclick="toggle('confirm', this)">Show</button>
        </div>
      </div>

      <div class="error-msg" id="signupError">Please fill in all fields correctly.</div>
      <div class="success-msg" id="signupSuccess">Account created! Redirecting...</div>
      <button type="submit" class="btn-create" id="signupBtn">Create account</button>
    </form>
  </div>

  <div class="footer">
    Already have an account? <a href="/login">Sign in</a>
  </div>

  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyC1xj2lQYZoiu7h-orFfGlOy2i54Y2BMdA",
      authDomain: "mailserver-life.firebaseapp.com",
      projectId: "mailserver-life",
      storageBucket: "mailserver-life.firebasestorage.app",
      messagingSenderId: "195734676668",
      appId: "1:195734676668:web:40a868601cbaf8d473dcb9",
      measurementId: "G-V216FC1QMD"
    };
    firebase.initializeApp(firebaseConfig);
    var auth = firebase.auth();
    var db = firebase.firestore();
    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

    var ENCRYPTION_KEY = 'XL!KD_USERAKFLAP';
    var STORAGE_KEY = 'mailserver_data';

    function getStorage() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return { users: {}, version: ENCRYPTION_KEY };
        var data = JSON.parse(raw);
        if (data.version !== ENCRYPTION_KEY) {
          return { users: {}, version: ENCRYPTION_KEY };
        }
        return data;
      } catch (e) {
        return { users: {}, version: ENCRYPTION_KEY };
      }
    }

    function saveStorage(data) {
      data.version = ENCRYPTION_KEY;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function getUsers() {
      return getStorage().users || {};
    }

    function saveUsers(users) {
      var data = getStorage();
      data.users = users;
      saveStorage(data);
    }

    function toggle(id, btn) {
      var input = document.getElementById(id);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = 'Hide';
      } else {
        input.type = 'password';
        btn.textContent = 'Show';
      }
    }

    var claimed = sessionStorage.getItem('mailserver_claim');
    var usernameInput = document.getElementById('username');
    if (claimed) {
      usernameInput.value = claimed;
    }

    document.getElementById('signupForm').addEventListener('submit', function(e) {
      e.preventDefault();

      var username = document.getElementById('username').value.trim().toLowerCase();
      var password = document.getElementById('password').value;
      var confirm = document.getElementById('confirm').value;
      var error = document.getElementById('signupError');
      var success = document.getElementById('signupSuccess');
      var btn = document.getElementById('signupBtn');

      if (!username || !password || !confirm) {
        error.textContent = 'Please fill in all fields.';
        error.style.display = 'block';
        return;
      }

      if (!/^[a-zA-Z0-9_]{3,24}$/.test(username)) {
        error.textContent = 'Username must be 3–24 characters (letters, numbers, underscores).';
        error.style.display = 'block';
        return;
      }

      if (password.length < 6) {
        error.textContent = 'Password must be at least 6 characters.';
        error.style.display = 'block';
        return;
      }

      if (password !== confirm) {
        error.textContent = 'Passwords do not match.';
        error.style.display = 'block';
        return;
      }

      error.style.display = 'none';
      success.style.display = 'block';
      success.textContent = 'Creating account...';
      btn.disabled = true;

      var email = username + '@mailserver.life';
      var users = getUsers();
      
      if (users[username]) {
        error.textContent = 'Username already taken.';
        error.style.display = 'block';
        success.style.display = 'none';
        btn.disabled = false;
        return;
      }

      db.collection('usernames').doc(username).get().then(function(snapshot) {
        if (snapshot.exists) {
          error.textContent = 'Username already taken. Try another.';
          error.style.display = 'block';
          success.style.display = 'none';
          btn.disabled = false;
          return;
        }

        return auth.createUserWithEmailAndPassword(email, password).then(function(userCredential) {
          var user = userCredential.user;
          return user.updateProfile({
            displayName: username
          }).then(function() {
            users[username] = {
              password: password,
              created: Date.now(),
              email: email,
              twofa: { enabled: false }
            };
            saveUsers(users);

            return db.collection('users').doc(user.uid).set({
              username: username,
              email: email,
              displayName: username,
              createdAt: firebase.firestore.FieldValue.serverTimestamp(),
              handles: [username],
              primaryHandle: username,
              bio: 'No bio yet.'
            });
          }).then(function() {
            return db.collection('usernames').doc(username).set({
              uid: user.uid,
              claimedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
          }).then(function() {
            sessionStorage.setItem('mailserver_session', JSON.stringify({ username: username, loggedIn: true }));
            sessionStorage.removeItem('mailserver_claim');
            setTimeout(function() {
              window.location.href = '/dashboard';
            }, 1500);
          });
        });
      }).catch(function(error) {
        btn.disabled = false;
        success.style.display = 'none';
        if (error.code === 'auth/email-already-in-use') {
          error.textContent = 'This username is already registered. Please sign in.';
        } else if (error.code === 'auth/invalid-email') {
          error.textContent = 'Invalid username. Use only letters, numbers, and underscores.';
        } else {
          error.textContent = 'Error creating account: ' + error.message;
        }
        error.style.display = 'block';
      });
    });
  </script>
</body>
</html>
