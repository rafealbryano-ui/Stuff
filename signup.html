<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up — mailserver.life</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0e0e0e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      padding: 40px 20px;
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand h1 {
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .brand p {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 6px;
    }

    .card {
      width: 100%;
      max-width: 340px;
      background: #1a1a1a;
      border: 0.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 28px 24px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 6px;
    }

    .input-wrap {
      display: flex;
      align-items: center;
      background: #111;
      border: 0.5px solid rgba(255, 255, 255, 0.1);
      border-radius: 7px;
      overflow: hidden;
    }

    .input-wrap:focus-within {
      border-color: rgba(255, 255, 255, 0.3);
    }

    .input-wrap input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 10px 12px;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
    }

    .input-wrap input::placeholder {
      color: rgba(255, 255, 255, 0.15);
    }

    .show-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.35);
      font-size: 12px;
      font-family: inherit;
      padding: 0 12px;
      height: 40px;
    }

    .show-btn:hover {
      color: rgba(255, 255, 255, 0.65);
    }

    .btn-create {
      width: 100%;
      padding: 11px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 4px;
    }

    .btn-create:hover {
      background: #e0e0e0;
    }

    .footer {
      text-align: center;
      margin-top: 18px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.35);
    }

    .footer a {
      color: #5b8ef0;
      text-decoration: none;
      font-weight: 500;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="brand">
    <h1>mailserver.life</h1>
    <p>Private. Simple. Yours.</p>
  </div>

  <div class="card">
    <div class="field">
      <label for="username">Username</label>
      <div class="input-wrap">
        <input type="text" id="username" name="username" autocomplete="username" />
      </div>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input type="password" id="password" name="password" autocomplete="new-password" />
        <button class="show-btn" type="button" onclick="toggle('password', this)">Show</button>
      </div>
    </div>

    <div class="field">
      <label for="confirm">Confirm Password</label>
      <div class="input-wrap">
        <input type="password" id="confirm" name="confirm" autocomplete="new-password" />
        <button class="show-btn" type="button" onclick="toggle('confirm', this)">Show</button>
      </div>
    </div>

    <button class="btn-create" type="button">Create account</button>
  </div>

  <div class="footer">
    Already have an account? <a href="/login">Sign in</a>
  </div>

  <script>
    function toggle(id, btn) {
      const input = document.getElementById(id);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = 'Hide';
      } else {
        input.type = 'password';
        btn.textContent = 'Show';
      }
    }
  </script>

</body>
</html>
