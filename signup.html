<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up — mailserver.life</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:#0e0e0e;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;padding:40px 20px}
    .brand{text-align:center;margin-bottom:32px}
    .brand h1{font-size:32px;font-weight:700;color:#fff;letter-spacing:-0.5px}
    .brand p{font-size:13px;color:rgba(255,255,255,0.4);margin-top:6px}
    .card{width:100%;max-width:340px;background:#1a1a1a;border:0.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:28px 24px}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:6px}
    .input-wrap{display:flex;align-items:center;background:#111;border:0.5px solid rgba(255,255,255,0.1);border-radius:7px;overflow:hidden}
    .input-wrap:focus-within{border-color:rgba(255,255,255,0.3)}
    .input-wrap input{flex:1;background:transparent;border:none;outline:none;padding:10px 12px;color:#fff;font-size:14px;font-family:inherit}
    .input-wrap input::placeholder{color:rgba(255,255,255,0.15)}
    .show-btn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.35);font-size:12px;font-family:inherit;padding:0 12px;height:40px}
    .show-btn:hover{color:rgba(255,255,255,0.65)}
    .btn-create{width:100%;padding:11px;background:#fff;color:#000;border:none;border-radius:7px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:4px}
    .btn-create:hover{background:#e0e0e0}
    .btn-create:disabled{opacity:0.5;cursor:not-allowed}
    .footer{text-align:center;margin-top:18px;font-size:13px;color:rgba(255,255,255,0.35)}
    .footer a{color:#5b8ef0;text-decoration:none;font-weight:500}
    .footer a:hover{text-decoration:underline}
    .error-msg{color:#ff6b6b;font-size:12px;margin-top:4px;display:none;text-align:center}
    .success-msg{color:#5b8ef0;font-size:12px;margin-top:4px;display:none;text-align:center}
    .domain-hint{font-size:11px;color:rgba(255,255,255,0.25);margin-top:4px;text-align:right;padding-right:4px}
    .save-password-row{display:flex;align-items:center;gap:10px;margin:12px 0 4px 0}
    .save-password-row input[type="checkbox"]{width:16px;height:16px;accent-color:#5b8ef0;cursor:pointer}
    .save-password-row label{font-size:12px;color:rgba(255,255,255,0.5);cursor:pointer;margin:0}
    .save-password-row label:hover{color:rgba(255,255,255,0.8)}
    .loading-spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

  <div class="brand">
    <h1>mailserver.life</h1>
    <p>Get your free @mailserver.life email</p>
  </div>

  <div class="card">
    <form id="signupForm">
      <div class="field">
        <label for="username">Choose your username</label>
        <div class="input-wrap">
          <input type="text" id="username" name="username" autocomplete="username" placeholder="username" required />
        </div>
        <div class="domain-hint">@mailserver.life · 3-24 characters · letters, numbers, underscores</div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password" autocomplete="new-password" placeholder="Create a password" required />
          <button class="show-btn" type="button" onclick="toggle('password', this)">Show</button>
        </div>
      </div>

      <div class="field">
        <label for="confirm">Confirm Password</label>
        <div class="input-wrap">
          <input type="password" id="confirm" name="confirm" autocomplete="new-password" placeholder="Confirm your password" required />
          <button class="show-btn" type="button" onclick="toggle('confirm', this)">Show</button>
        </div>
      </div>

      <div class="save-password-row">
        <input type="checkbox" id="savePassword" checked />
        <label for="savePassword">Save my password</label>
      </div>

      <div class="error-msg" id="signupError">Please fill in all fields correctly.</div>
      <div class="success-msg" id="signupSuccess">Account created! Redirecting...</div>
      <button type="submit" class="btn-create" id="signupBtn">Create account</button>
    </form>
  </div>

  <div class="footer">
    Already have an account? <a href="/login.html">Sign in</a>
  </div>

  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyC1xj2lQYZoiu7h-orFfGlOy2i54Y2BMdA",
      authDomain: "mailserver-life.firebaseapp.com",
      projectId: "mailserver-life",
      storageBucket: "mailserver-life.firebasestorage.app",
      messagingSenderId: "195734676668",
      appId: "1:195734676668:web:40a868601cbaf8d473dcb9",
      measurementId: "G-V216FC1QMD"
    };
    firebase.initializeApp(firebaseConfig);
    var auth = firebase.auth();
    var db = firebase.firestore();
    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

    function toggle(id, btn) {
      var input = document.getElementById(id);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = 'Hide';
      } else {
        input.type = 'password';
        btn.textContent = 'Show';
      }
    }

    function saveCredentials(username, password) {
      if (document.getElementById('savePassword').checked) {
        try {
          localStorage.setItem('mailserver_credentials', JSON.stringify({
            username: username,
            password: password
          }));
        } catch(e) {}
      }
    }

    function getNextAvailableNumber() {
      return db.collection('handles').get().then(function(snapshot) {
        var usedNumbers = [];
        snapshot.forEach(function(doc) {
          var num = doc.data().userNumber;
          if (num) usedNumbers.push(num);
        });
        usedNumbers.sort(function(a, b) { return a - b; });
        var next = 1;
        for (var i = 0; i < usedNumbers.length; i++) {
          if (usedNumbers[i] === next) {
            next++;
          } else if (usedNumbers[i] > next) {
            break;
          }
        }
        return next;
      });
    }

    var claimed = sessionStorage.getItem('mailserver_claim');
    var usernameInput = document.getElementById('username');
    if (claimed) {
      usernameInput.value = claimed;
    }

    document.getElementById('signupForm').addEventListener('submit', function(e) {
      e.preventDefault();

      var username = document.getElementById('username').value.trim().toLowerCase();
      var password = document.getElementById('password').value;
      var confirm = document.getElementById('confirm').value;
      var error = document.getElementById('signupError');
      var success = document.getElementById('signupSuccess');
      var btn = document.getElementById('signupBtn');

      error.style.display = 'none';
      success.style.display = 'none';

      if (!username || !password || !confirm) {
        error.textContent = 'Please fill in all fields.';
        error.style.display = 'block';
        return;
      }

      if (!/^[a-zA-Z0-9_]{3,24}$/.test(username)) {
        error.textContent = 'Username must be 3-24 characters (letters, numbers, underscores).';
        error.style.display = 'block';
        return;
      }

      if (password.length < 6) {
        error.textContent = 'Password must be at least 6 characters.';
        error.style.display = 'block';
        return;
      }

      if (password !== confirm) {
        error.textContent = 'Passwords do not match.';
        error.style.display = 'block';
        return;
      }

      success.style.display = 'block';
      success.textContent = 'Creating your email...';
      btn.disabled = true;

      var email = username + '@mailserver.life';

      db.collection('handles').doc(username).get()
        .then(function(snapshot) {
          if (snapshot.exists) {
            throw new Error('Username already taken');
          }
          return auth.fetchSignInMethodsForEmail(email);
        })
        .then(function(methods) {
          if (methods && methods.length > 0) {
            throw new Error('This username was previously registered. Please choose another.');
          }
          return getNextAvailableNumber();
        })
        .then(function(userNumber) {
          return auth.createUserWithEmailAndPassword(email, password)
            .then(function(userCredential) {
              var user = userCredential.user;
              return user.updateProfile({ displayName: username })
                .then(function() {
                  var userData = {
                    username: username,
                    email: email,
                    displayName: username,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    handles: [username],
                    primaryHandle: username,
                    bio: 'No bio yet.',
                    userNumber: userNumber
                  };
                  return db.collection('users').doc(user.uid).set(userData);
                })
                .then(function() {
                  var handleData = {
                    username: username,
                    ownerUid: user.uid,
                    userNumber: userNumber,
                    displayName: username,
                    bio: 'No bio yet.',
                    avatarUrl: '',
                    accentColor: '#4f7cff',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                  };
                  return db.collection('handles').doc(username).set(handleData);
                })
                .then(function() {
                  return db.collection('usernames').doc(username).set({
                    uid: user.uid,
                    claimedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    userNumber: userNumber
                  });
                })
                .then(function() {
                  saveCredentials(username, password);
                  sessionStorage.setItem('mailserver_session', JSON.stringify({ username: username, loggedIn: true }));
                  sessionStorage.removeItem('mailserver_claim');
                  success.textContent = 'Account created with #' + userNumber + '! Redirecting...';
                  setTimeout(function() {
                    window.location.href = '/inbox.html';
                  }, 2000);
                });
            });
        })
        .catch(function(error) {
          btn.disabled = false;
          success.style.display = 'none';
          console.error('Signup error:', error.code, error.message);
          if (error.code === 'auth/email-already-in-use') {
            error.textContent = 'This username is already registered. Please sign in.';
          } else if (error.message === 'This username was previously registered. Please choose another.') {
            error.textContent = 'This username was previously used. Please choose another.';
          } else if (error.message === 'Username already taken') {
            error.textContent = 'This username is already taken. Please choose another.';
          } else if (error.code === 'auth/invalid-email') {
            error.textContent = 'Invalid username. Use only letters, numbers, and underscores.';
          } else if (error.code === 'auth/weak-password') {
            error.textContent = 'Password is too weak. Use at least 6 characters.';
          } else if (error.code === 'permission-denied') {
            error.textContent = 'Permission error. Please check Firestore security rules.';
          } else {
            error.textContent = 'Error creating account: ' + error.message;
          }
          error.style.display = 'block';
        });
    });
  </script>
</body>
</html>
